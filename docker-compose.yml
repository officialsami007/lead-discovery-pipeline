services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lead_pipeline
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - lead_pipeline_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d lead_pipeline']
      interval: 3s
      timeout: 3s
      retries: 20

  migrate:
    build: .
    environment: &app-env
      DATABASE_URL: postgres://postgres:postgres@db:5432/lead_pipeline
      COOKIE_SECRET: local-development-cookie-secret-change-in-production
      APP_ORIGIN: http://localhost:3000
      NODE_ENV: production
      LOG_LEVEL: info
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      VERIFY_DELAY_MS: ${VERIFY_DELAY_MS:-700}
    depends_on:
      db:
        condition: service_healthy
    command: ['sh', '-c', 'npm run db:migrate && npm run db:seed']
    restart: 'no'

  api:
    build: .
    environment:
      <<: *app-env
      PORT: 3000
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ['node', 'apps/api/dist/server.js']
    ports:
      - '3000:3000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  worker:
    build: .
    environment:
      <<: *app-env
      CRASH_AFTER_DISCOVER_COMMIT: 'false'
    depends_on:
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    command: ['node', 'apps/worker/dist/main.js']

volumes:
  lead_pipeline_pgdata:
